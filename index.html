<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<div class="calculator">
 
  <!-- Display -->
  <div class="display">
    <div class="display-expression" id="expression"></div>
    <div class="display-value" id="displayValue">0</div>
  </div>
 
  <!-- Buttons -->
  <div class="buttons">
    <!-- Row 1 -->
    <button class="clear wide" id="clearBtn">AC</button>
    <button class="back"       id="backBtn">⌫</button>
    <button class="operator"   data-op="÷">÷</button>
 
    <!-- Row 2 -->
    <button class="digit" data-digit="7">7</button>
    <button class="digit" data-digit="8">8</button>
    <button class="digit" data-digit="9">9</button>
    <button class="operator" data-op="×">×</button>
 
    <!-- Row 3 -->
    <button class="digit" data-digit="4">4</button>
    <button class="digit" data-digit="5">5</button>
    <button class="digit" data-digit="6">6</button>
    <button class="operator" data-op="−">−</button>
 
    <!-- Row 4 -->
    <button class="digit" data-digit="1">1</button>
    <button class="digit" data-digit="2">2</button>
    <button class="digit" data-digit="3">3</button>
    <button class="operator" data-op="+">+</button>
 
    <!-- Row 5 -->
    <button class="digit" data-digit="0">0</button>
    <button class="decimal" id="decimalBtn">.</button>
    <button class="equals wide" id="equalsBtn">=</button>
  </div>
 
</div>
 
<!-- Script at the bottom so all HTML elements exist before JS runs -->
<script src="script.js"></script>
 
</body>
</html>
